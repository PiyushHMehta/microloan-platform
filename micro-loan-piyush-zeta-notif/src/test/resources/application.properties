app.name=zea-2026-b02-piyushm-microloan

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.flyway.enabled=false

spring.security.user.name=test
spring.security.user.password=test

logging.level.root=WARN
logging.level.in.zeta=WARN

atropos.enabled=false
spring.kafka.bootstrap-servers=localhost:9092

sessions.proteus.endpoint=http://localhost:8080
certstore.proteus.endpoint=http://localhost:8080

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@example.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from=test@example.com

app.loan.max-emi-to-income-ratio=0.50
app.loan.interest-model=FLAT
app.loan.default-penalty-rate=2.0
app.scheduler.overdue-cron=0 0 1 * * *
app.scheduler.enabled=false

atropos.enabled=false
atropos.publish.mode=KINESIS
atropos.borrowerRegistered.topic=borrower-registered
atropos.kycStatusUpdated.topic=kyc-status-updated
atropos.loanApplicationApproved.topic=loan-application-approved
atropos.loanIssued.topic=loan-issued
atropos.loanRejected.topic=loan-rejected
atropos.kfsGenerated.topic=kfs-generated
atropos.loanOverdue.topic=loan-overdue
atropos.loanClosed.topic=loan-closed
atropos.repaymentMade.topic=repayment-made
