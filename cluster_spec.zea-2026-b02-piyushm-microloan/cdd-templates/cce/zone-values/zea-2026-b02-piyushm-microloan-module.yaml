        transformerJS: |-
          function transform(payload, sender) {
              return JSON.stringify(payload.data);
          }
        webhookRequest: |-
          {
            "method": "POST",
            "url": "https://microloannotif-{{ .Release.Namespace.Stripped }}.internal.cce.zetaapps.in/api/notifications/webhook",
